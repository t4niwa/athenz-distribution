apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: athenz

resources:
- deployment.yaml
- namespace.yaml
- service.yaml
- serviceaccount.yaml

generatorOptions:
  disableNameSuffixHash: true

#secretGenerator:
#- files:
#  - ca.cert.pem=certs/ca.cert.pem
#  name: athenz-cacert
#  type: Opaque

configMapGenerator:
- envs:
  - athenz-sia/athenz-sia.env
  name: authzproxy-sia
- files:
  - config.yaml=envoy/config.yaml
  - identity_sds.yaml=envoy/identity_sds.yaml
  - ca_sds.yaml=envoy/ca_sds.yaml
  name: authzproxy-envoy
- files:
  - config.yaml=authorization-proxy/config.yaml
  name: authzproxy-config

replacements:
- source:
    fieldPath: data.SERVICEACCOUNT
    kind: ConfigMap
    name: authzproxy-sia
    version: v1
  targets:
  - fieldPaths:
    - metadata.name
    options:
      create: true
    select:
      kind: ServiceAccount
      name: authzproxy-serviceaccount
      version: v1
  - fieldPaths:
    - spec.template.spec.serviceAccountName
    options:
      create: true
    select:
      kind: Deployment
      name: authzproxy-deployment
      version: v1
images:
- name: docker.io/athenz/authorization-proxy:latest
  newName: docker.io/tatyano/authorization-proxy
  newTag: latest
